<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>23rd Special Tactics Squadron</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,-25" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
<header>
    <div class="logo">
        <img src="./assets/logo.png" alt="">
        <span class="logo-text">23rd STS</span>
    </div>
    <nav>
        <ul>
            <li><a href='./'>HOME</a></li>
            <li><a href='/apply.html'>APPLY</a></li>
            <li><a href="https://discord.gg/YrHST8EcfC">DISCORD</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="banner">
        <div class="banner-content">
            <div class="banner-logo">
                <img src="./assets/logo.png" alt="23rd STS Emblem">
            </div>

            <h1>23rd Special Tactics Squadron</h1>
            <p class="banner-subtitle">ARMA 3 SUPPORT UNIT // ESTABLISHED 2022</p>
            <div class="banner-buttons">
                <a class='btn btn-primary' href='/apply.html'>APPLY</a>
                <a class='btn btn-secondary' href='https://discord.gg/YrHST8EcfC'>DISCORD</a>
            </div>

        </div>

        <span class="banner-chevron material-symbols-outlined">keyboard_arrow_down</span>
    </section>

    <section class="temp-blank-space" aria-hidden="true"></section>

    <div class="footer">
        © 2022-2026 // 23rd Special Tactics Squadron
    </div>

</main>

<script>
    const header = document.querySelector('header');
    const banner = document.querySelector('.banner');
    let isSnappingBanner = false;

    function updateHeader() {
        if (window.scrollY === 0) header.classList.add('at-top');
        else header.classList.remove('at-top');
    }

    function snapPastBanner() {
        if (!banner || isSnappingBanner) return;

        isSnappingBanner = true;
        window.scrollTo({
            top: banner.offsetTop + banner.offsetHeight,
            behavior: 'smooth'
        });

        window.setTimeout(() => {
            isSnappingBanner = false;
        }, 700);
    }

    function handleBannerWheel(event) {
        if (!banner) return;

        const bannerBottom = banner.offsetTop + banner.offsetHeight;
        if (event.deltaY <= 0 || window.scrollY >= bannerBottom - 2 || isSnappingBanner) return;

        event.preventDefault();
        snapPastBanner();
    }

    updateHeader();
    window.addEventListener('scroll', updateHeader);
    window.addEventListener('wheel', handleBannerWheel, { passive: false });

</script>
</body>
</html>
